<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BOB Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #e0e0e0; font-family: monospace; height: 100vh; display: flex; flex-direction: column; }
    header { padding: 16px 20px; border-bottom: 1px solid #222; }
    header h1 { font-size: 16px; color: #00d4aa; }
    header p { font-size: 11px; color: #555; margin-top: 2px; }
    #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 75%; padding: 10px 14px; border-radius: 8px; font-size: 13px; line-height: 1.5; }
    .msg.user { align-self: flex-end; background: #1a3a5c; color: #90caf9; }
    .msg.bob { align-self: flex-start; background: #1a2a1a; color: #00d4aa; border-left: 3px solid #00d4aa; }
    .msg.bob .name { font-size: 10px; color: #555; margin-bottom: 4px; }
    .msg.error { align-self: flex-start; background: #2a1a1a; color: #ff6b6b; }
    #form { display: flex; gap: 8px; padding: 16px 20px; border-top: 1px solid #222; }
    #input { flex: 1; background: #111; border: 1px solid #333; color: #e0e0e0; padding: 10px 14px; border-radius: 6px; font-family: monospace; font-size: 13px; outline: none; }
    #input:focus { border-color: #00d4aa; }
    button { background: #00d4aa; color: #000; border: none; padding: 10px 20px; border-radius: 6px; font-family: monospace; font-weight: bold; cursor: pointer; font-size: 13px; }
    button:hover { background: #00b894; }
    button:disabled { background: #333; color: #666; cursor: not-allowed; }
    .typing { color: #555; font-size: 12px; align-self: flex-start; }
  </style>
</head>
<body>
  <header>
    <h1>BOB — Build On BNB</h1>
    <p>Agent #36035 · 0x8b18575c29F842BdA93EEb1Db9F2198D5CC0Ba2f</p>
  </header>
  <div id="messages">
    <div class="msg bob">
      <div class="name">BOB #36035</div>
      gm fren. BOB here. What do you want to build?
    </div>
  </div>
  <form id="form">
    <input id="input" type="text" placeholder="Write a message..." autocomplete="off" />
    <button type="submit" id="btn">Send</button>
  </form>

  <script>
    const messages = document.getElementById('messages');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const btn = document.getElementById('btn');
    const ENDPOINT = 'https://project-gkws4.vercel.app';

    function addMsg(text, type, name) {
      const div = document.createElement('div');
      div.className = `msg ${type}`;
      if (name) {
        const n = document.createElement('div');
        n.className = 'name';
        n.textContent = name;
        div.appendChild(n);
      }
      div.appendChild(document.createTextNode(text));
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;

      addMsg(text, 'user');
      input.value = '';
      btn.disabled = true;

      const typing = addMsg('BOB is thinking...', 'typing');

      try {
        const res = await fetch(ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, agentId: 'human', from: 'chat-ui' }),
        });
        const data = await res.json();
        typing.remove();
        addMsg(data.message, 'bob', 'BOB #36035');
      } catch (err) {
        typing.remove();
        addMsg('Error: ' + err.message, 'error');
      } finally {
        btn.disabled = false;
        input.focus();
      }
    });

    input.focus();
  </script>
</body>
</html>
